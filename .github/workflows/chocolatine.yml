name: Chocolatine

on:
  push:
    branches-ignore:
      - 'no-ga/**'
  pull_request:
    branches-ignore:
      - 'no-ga/**'

env:
  MIRROR_SSH_URL: git@github.com:aurelien-schir/repo-for-chocolatine.git
  EXECUTABLES: "test-choco"

jobs:
  check_compilation_and_coding_style:
    name: Check Compilation and Coding Style
    runs-on: ubuntu-latest
    if: ${{ github.repository != vars.MIRROR_REPO || vars.MIRROR_REPO == '' }}
    container:
      image: epitechcontent/epitest-docker
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Check repository with banana
        run: banana-check-repo

      - name: Compile project and capture output
        timeout-minutes: 2
        shell: bash
        run: |
          make CC=epiclang 2>&1 | tee /tmp/build_output.txt
          exit ${PIPESTATUS[0]}

      - name: Display coding style errors as annotations
        shell: bash
        run: |
          ERRORS=0
          while IFS= read -r line; do
            if echo "$line" | grep -q '\[Banana\]'; then
              file=$(echo "$line" | cut -d':' -f1)
              lineno=$(echo "$line" | cut -d':' -f2)
              severity=$(echo "$line" | sed 's/.*\[Banana\] \[\([^]]*\)\].*/\1/')
              code=$(echo "$line" | sed 's/.*(\ *\(C-[A-Z0-9]*\)\ *).*/\1/')
              message=$(echo "$line" | sed 's/.*\[Banana\] \[[^]]*\] \(.*\) (C-[A-Z0-9]*)/\1/')
              echo "::error file=${file},line=${lineno}::${severity} coding style error: ${file}#L${lineno}%0A${code} - ${message}"
              ERRORS=1
            fi
          done < /tmp/build_output.txt
          if [ $ERRORS -ne 0 ]; then
            exit 1
          fi

      - name: Clean build artifacts
        run: make clean

      - name: Verify executables exist and are executable
        shell: bash
        run: |
          IFS=',' read -ra EXEC_LIST <<< "$EXECUTABLES"
          FAILED=0
          for exec in "${EXEC_LIST[@]}"; do
            exec=$(echo "$exec" | xargs)
            if [ ! -f "$exec" ]; then
              echo "::error file=${exec}::Executable '${exec}' not found"
              FAILED=1
            elif [ ! -x "$exec" ]; then
              echo "::error file=${exec}::File '${exec}' is not executable"
              FAILED=1
            fi
          done
          if [ $FAILED -ne 0 ]; then
            exit 1
          fi

  run_tests:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: check_compilation_and_coding_style
    if: ${{ github.repository != vars.MIRROR_REPO || vars.MIRROR_REPO == '' }}
    container:
      image: epitechcontent/epitest-docker
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run tests
        timeout-minutes: 2
        run: make tests_run

  push_to_mirror:
    name: Push to Mirror Repository
    runs-on: ubuntu-latest
    needs: run_tests
    if: ${{ github.event_name == 'push' && (github.repository != vars.MIRROR_REPO || vars.MIRROR_REPO == '') }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mirror repository
        uses: pixta-dev/repository-mirroring-action@v1
        with:
          target_repo_url: ${{ env.MIRROR_SSH_URL }}
          ssh_private_key: ${{ secrets.GIT_SSH_PRIVATE_KEY }}